apiVersion: cilium.io/v2alpha1
kind: CiliumBGPPeeringPolicy
metadata:
  name: bgp-peering
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
  virtualRouters:
    - localASN: 65001
      exportPodCIDR: true
      serviceAdvertisements:
        - LoadBalancerIP
      neighbors:
        - peerAddress: 192.0.2.10/32
          peerASN: 65000
          peerPort: 179
          connectRetryTimeSeconds: 120
          holdTimeSeconds: 90
          keepAliveTimeSeconds: 30
          eBGPMultihopTTL: 1
          gracefulRestart:
            enabled: true
            restartTimeSeconds: 120

